<!DOCTYPE html>
<html lang="et">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Interaktiivne Tähtede Sadu</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    overflow:hidden;
    height:100vh;
    background:
        radial-gradient(circle at bottom, #1f2f5c 0%, #0b1026 50%, #02030a 100%);
    font-family:Arial,sans-serif;
    cursor:crosshair;
}

/* SKY GLOW */
.sky-glow{
    position:absolute;
    inset:0;
    background:
        radial-gradient(circle at top, rgba(120,150,255,0.12), transparent 60%);
}

/* MOON */
.moon{
    position:absolute;
    width:170px;
    height:170px;
    border-radius:50%;
    top:60px;
    right:120px;

    background:
        radial-gradient(circle at 35% 35%,
        #ffffff 0%,
        #f0f3ff 45%,
        #c7d0ff 75%,
        #9aa8ff 100%);

    box-shadow:
        0 0 40px rgba(255,255,255,0.8),
        0 0 90px rgba(180,200,255,0.5),
        0 0 150px rgba(120,160,255,0.3);
}

/* MOON CRATERS */
.crater{
    position:absolute;
    border-radius:50%;
    background:rgba(180,190,220,0.35);
}

.c1{
    width:24px;
    height:24px;
    top:40px;
    left:55px;
}

.c2{
    width:18px;
    height:18px;
    top:90px;
    left:100px;
}

.c3{
    width:12px;
    height:12px;
    top:70px;
    left:40px;
}

/* BACKGROUND STARS */
.star{
    position:absolute;
    background:white;
    border-radius:50%;
    animation:twinkle infinite alternate;
}

@keyframes twinkle{
    from{
        opacity:0.3;
        transform:scale(1);
    }

    to{
        opacity:1;
        transform:scale(1.5);
    }
}

/* SHOOTING STARS */
.shooting-star{
    position:absolute;
    width:3px;
    height:3px;
    background:white;
    border-radius:50%;
    box-shadow:
        0 0 10px white,
        0 0 20px #8ab4ff,
        0 0 40px #8ab4ff;

    pointer-events:none;
}

.shooting-star::after{
    content:"";
    position:absolute;
    width:180px;
    height:2px;
    background:
        linear-gradient(
            to right,
            rgba(255,255,255,0.9),
            rgba(255,255,255,0)
        );

    transform-origin:left center;
    transform:rotate(0deg);
}

/* MOUNTAINS */
.mountain{
    position:absolute;
    bottom:0;
    width:0;
    height:0;
    border-left:260px solid transparent;
    border-right:260px solid transparent;
    border-bottom:320px solid rgba(15,20,35,0.95);
}

.m1{
    left:-100px;
}

.m2{
    left:220px;
    transform:scale(1.2);
}

.m3{
    right:150px;
    transform:scale(1.1);
}

.m4{
    right:-120px;
}

/* FOREST */
.forest{
    position:absolute;
    bottom:0;
    width:100%;
    height:220px;
}

/* TREES */
.tree{
    position:absolute;
    bottom:0;
    width:0;
    height:0;
    border-left:35px solid transparent;
    border-right:35px solid transparent;
    border-bottom:120px solid #09111f;
}

.tree::after{
    content:"";
    position:absolute;
    width:10px;
    height:35px;
    background:#111;
    left:-5px;
    top:120px;
}

.glow{
    position:absolute;
    width:6px;
    height:6px;
    border-radius:50%;
    background:#a7c8ff;
    box-shadow:
        0 0 8px #a7c8ff,
        0 0 15px #7ca7ff;
    animation:pulse 2s infinite alternate;
}

@keyframes pulse{
    from{
        opacity:0.3;
        transform:scale(1);
    }

    to{
        opacity:1;
        transform:scale(1.8);
    }
}

/* TITLE */
.title{
    position:absolute;
    top:40px;
    left:50px;
    color:white;
    font-size:52px;
    font-weight:bold;
    letter-spacing:2px;

    text-shadow:
        0 0 10px rgba(255,255,255,0.5),
        0 0 20px rgba(120,160,255,0.4);
}

.subtitle{
    position:absolute;
    top:105px;
    left:54px;
    color:#b8c8ff;
    font-size:20px;
    letter-spacing:1px;
}

/* CLICK EFFECT */
.click-ring{
    position:absolute;
    border:2px solid rgba(255,255,255,0.7);
    border-radius:50%;
    pointer-events:none;
    animation:ring 0.8s ease-out forwards;
}

@keyframes ring{
    from{
        width:10px;
        height:10px;
        opacity:1;
        transform:translate(-50%,-50%);
    }

    to{
        width:180px;
        height:180px;
        opacity:0;
        transform:translate(-50%,-50%);
    }
}

</style>
</head>

<body>

<div class="sky-glow"></div>

<!-- MOON -->
<div class="moon">
    <div class="crater c1"></div>
    <div class="crater c2"></div>
    <div class="crater c3"></div>
</div>

<!-- TITLE -->
<div class="title">Öine Tähtede Sadu</div>
<div class="subtitle">
    Liiguta hiirt või kliki taevasse ✨
</div>

<!-- MOUNTAINS -->
<div class="mountain m1"></div>
<div class="mountain m2"></div>
<div class="mountain m3"></div>
<div class="mountain m4"></div>

<!-- FOREST -->
<div class="forest" id="forest"></div>

<script>

/* BACKGROUND STARS */
for(let i = 0; i < 180; i++){

    const star = document.createElement("div");
    star.classList.add("star");

    const size = Math.random() * 3;

    star.style.width = size + "px";
    star.style.height = size + "px";

    star.style.left = Math.random() * window.innerWidth + "px";
    star.style.top = Math.random() * window.innerHeight * 0.75 + "px";

    star.style.animationDuration =
        (1 + Math.random() * 4) + "s";

    document.body.appendChild(star);
}

/* TREES */
const forest = document.getElementById("forest");

for(let i = 0; i < 45; i++){

    const tree = document.createElement("div");
    tree.classList.add("tree");

    tree.style.left =
        Math.random() * window.innerWidth + "px";

    tree.style.transform =
        `scale(${0.5 + Math.random() * 1.4})`;

    forest.appendChild(tree);

    /* GLOW LIGHTS */
    if(Math.random() > 0.65){

        const glow = document.createElement("div");
        glow.classList.add("glow");

        glow.style.left =
            parseFloat(tree.style.left) + 20 + "px";

        glow.style.bottom =
            (40 + Math.random() * 140) + "px";

        document.body.appendChild(glow);
    }
}

/* SHOOTING STAR FUNCTION */
function createShootingStar(x,y){

    const star = document.createElement("div");
    star.classList.add("shooting-star");

    star.style.left = x + "px";
    star.style.top = y + "px";

    document.body.appendChild(star);

    const angle = 25 + Math.random() * 20;
    const distance = 500 + Math.random() * 400;

    star.animate([
        {
            transform:`translate(0,0) rotate(${angle}deg)`,
            opacity:1
        },
        {
            transform:
            `translate(${distance}px, ${distance * 0.45}px)
             rotate(${angle}deg)`,

            opacity:0
        }
    ],{
        duration:1200,
        easing:"ease-out"
    });

    setTimeout(() => {
        star.remove();
    },1300);
}

/* AUTO STAR RAIN */
setInterval(() => {

    const x = Math.random() * window.innerWidth * 0.7;
    const y = Math.random() * window.innerHeight * 0.4;

    createShootingStar(x,y);

}, 700);

/* INTERACTIVE MOUSE MOVE */
document.addEventListener("mousemove",(e) => {

    if(Math.random() > 0.92){

        createShootingStar(e.clientX,e.clientY);
    }
});

/* CLICK BURST */
document.addEventListener("click",(e) => {

    const ring = document.createElement("div");
    ring.classList.add("click-ring");

    ring.style.left = e.clientX + "px";
    ring.style.top = e.clientY + "px";

    document.body.appendChild(ring);

    setTimeout(() => {
        ring.remove();
    },800);

    for(let i = 0; i < 6; i++){

        setTimeout(() => {

            createShootingStar(
                e.clientX + Math.random()*120 - 60,
                e.clientY + Math.random()*50 - 25
            );

        }, i * 120);
    }
});

</script>

</body>
</html>
