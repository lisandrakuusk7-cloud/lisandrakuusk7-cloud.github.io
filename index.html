<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Simba 2000s TV</title>

<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
    }

    body{
        height:100vh;
        display:flex;
        justify-content:center;
        align-items:center;
        background:linear-gradient(to bottom,#ffd95a,#ffb347);
        overflow:hidden;
        font-family:Verdana,sans-serif;
    }

    .scene{
        position:relative;
    }

    /* TV BODY */
    .tv{
        position:relative;
        width:520px;
        height:430px;
        background:#f4c542;
        border:10px solid #d99918;
        border-radius:40px;
        box-shadow:
            inset -8px -8px 0 rgba(0,0,0,0.15),
            0 20px 40px rgba(0,0,0,0.3);
    }

    /* EARS */
    .ear{
        position:absolute;
        width:120px;
        height:120px;
        background:#f4c542;
        border:10px solid #d99918;
        border-radius:50%;
        top:-45px;
        z-index:-1;
    }

    .ear::after{
        content:"";
        position:absolute;
        width:55px;
        height:55px;
        background:#ffb7c5;
        border-radius:50%;
        top:25px;
        left:25px;
    }

    .ear.left{ left:-40px; }
    .ear.right{ right:-40px; }

    /* SCREEN */
    .screen-frame{
        position:absolute;
        top:55px;
        left:55px;
        width:410px;
        height:220px;
        background:#5b3b0f;
        border-radius:18px;
        padding:10px;
        box-shadow:inset 0 0 10px rgba(0,0,0,0.4);
    }

    .screen{
        width:100%;
        height:100%;
        border-radius:10px;
        overflow:hidden;
        background:#111;
        position:relative;
        display:flex;
        justify-content:center;
        align-items:center;
    }

    .screen.off{
        background:
            repeating-linear-gradient(
                0deg,
                #111,
                #111 3px,
                #1c1c1c 3px,
                #1c1c1c 6px
            );
    }

    .screen img{
        width:100%;
        height:100%;
        object-fit:cover;
        display:none;
    }

    .message{
        color:#8cff8c;
        font-size:22px;
        text-shadow:0 0 10px #00ff00;
        text-align:center;
        padding:20px;
    }

    /* BUTTON PANEL */
    .controls{
        position:absolute;
        bottom:45px;
        width:100%;
        display:flex;
        justify-content:center;
        gap:22px;
    }

    button{
        cursor:pointer;
        border:none;
        transition:0.15s;
    }

    button:active{
        transform:translateY(3px);
    }

    /* NOSE POWER BUTTON */
    .power-btn{
        width:70px;
        height:55px;
        background:#ff89a8;
        border-radius:50% 50% 60% 60%;
        border:4px solid #d65f7d;
        box-shadow:0 5px 0 #b54864;
        position:relative;
    }

    .power-btn::before,
    .power-btn::after{
        content:"";
        position:absolute;
        width:8px;
        height:12px;
        background:#8b2f45;
        border-radius:50%;
        top:18px;
    }

    .power-btn::before{ left:20px; }
    .power-btn::after{ right:20px; }

    /* PAW BUTTONS */
    .paw-btn{
        width:70px;
        height:70px;
        border-radius:50%;
        background:#ffcb73;
        border:4px solid #d99918;
        position:relative;
        box-shadow:0 5px 0 #b87b12;
    }

    .paw-btn .toe{
        position:absolute;
        width:12px;
        height:16px;
        background:#7a4c11;
        border-radius:50%;
    }

    .paw-btn .pad{
        position:absolute;
        width:28px;
        height:24px;
        background:#7a4c11;
        border-radius:50%;
        left:20px;
        top:30px;
    }

    .toe.t1{ top:10px; left:14px; }
    .toe.t2{ top:5px; left:28px; }
    .toe.t3{ top:10px; right:14px; }
    .toe.t4{ top:20px; left:28px; }

    /* LABELS */
    .label{
        position:absolute;
        width:100%;
        text-align:center;
        bottom:-22px;
        font-size:12px;
        color:#6b4300;
        font-weight:bold;
    }

    /* WHISKERS */
    .whiskers-left,
    .whiskers-right{
        position:absolute;
        top:170px;
        width:90px;
        height:90px;
    }

    .whiskers-left{
        left:-80px;
    }

    .whiskers-right{
        right:-80px;
    }

    .whiskers-left span,
    .whiskers-right span{
        position:absolute;
        width:85px;
        height:3px;
        background:#5b3b0f;
    }

    .whiskers-left span:nth-child(1){
        transform:rotate(-10deg);
        top:20px;
    }

    .whiskers-left span:nth-child(2){
        top:40px;
    }

    .whiskers-left span:nth-child(3){
        transform:rotate(10deg);
        top:60px;
    }

    .whiskers-right span:nth-child(1){
        transform:rotate(10deg);
        top:20px;
    }

    .whiskers-right span:nth-child(2){
        top:40px;
    }

    .whiskers-right span:nth-child(3){
        transform:rotate(-10deg);
        top:60px;
    }

    /* PAW LEGS */
    .legs{
        position:absolute;
        width:100%;
        bottom:-55px;
        display:flex;
        justify-content:space-between;
        padding:0 60px;
    }

    .leg{
        width:90px;
        height:55px;
        background:#f4c542;
        border:8px solid #d99918;
        border-radius:25px;
        position:relative;
    }

    .toe-pad{
        position:absolute;
        bottom:6px;
        width:14px;
        height:14px;
        background:#7a4c11;
        border-radius:50%;
    }

    .toe-pad:nth-child(1){ left:10px; }
    .toe-pad:nth-child(2){ left:28px; }
    .toe-pad:nth-child(3){ left:46px; }
    .toe-pad:nth-child(4){ left:64px; }

    /* TV STATIC */
    .static{
        position:absolute;
        inset:0;
        background-image:
            radial-gradient(#fff 1px, transparent 1px);
        background-size:4px 4px;
        opacity:0.15;
        animation:noise 0.2s infinite;
        pointer-events:none;
    }

    @keyframes noise{
        from{ transform:translate(0,0);}
        to{ transform:translate(-2px,2px);}
    }

</style>
</head>
<body>

<div class="scene">

    <div class="tv">

        <!-- EARS -->
        <div class="ear left"></div>
        <div class="ear right"></div>

        <!-- WHISKERS -->
        <div class="whiskers-left">
            <span></span><span></span><span></span>
        </div>

        <div class="whiskers-right">
            <span></span><span></span><span></span>
        </div>

        <!-- SCREEN -->
        <div class="screen-frame">
            <div class="screen off" id="screen">
                <div class="static"></div>

                <div class="message" id="message">
                    Simba TV 2000 ✨<br><br>
                    Press PLAY
                </div>

                <!-- Lion King GIF -->
                <img
                    id="gif"
                    src="https://media.giphy.com/media/T7kKcENcq6TNm/giphy.gif"
                    alt="Lion King GIF"
                />
            </div>
        </div>

        <!-- CONTROLS -->
        <div class="controls">

            <!-- POWER -->
            <div style="position:relative;">
                <button class="power-btn" id="powerBtn"></button>
                <div class="label">POWER</div>
            </div>

            <!-- PLAY -->
            <div style="position:relative;">
                <button class="paw-btn" id="playBtn">
                    <span class="toe t1"></span>
                    <span class="toe t2"></span>
                    <span class="toe t3"></span>
                    <span class="toe t4"></span>
                    <span class="pad"></span>
                </button>
                <div class="label">PLAY</div>
            </div>

            <!-- VOLUME -->
            <div style="position:relative;">
                <button class="paw-btn" id="volBtn">
                    <span class="toe t1"></span>
                    <span class="toe t2"></span>
                    <span class="toe t3"></span>
                    <span class="toe t4"></span>
                    <span class="pad"></span>
                </button>
                <div class="label">VOLUME</div>
            </div>

        </div>

        <!-- LEGS -->
        <div class="legs">
            <div class="leg">
                <span class="toe-pad"></span>
                <span class="toe-pad"></span>
                <span class="toe-pad"></span>
                <span class="toe-pad"></span>
            </div>

            <div class="leg">
                <span class="toe-pad"></span>
                <span class="toe-pad"></span>
                <span class="toe-pad"></span>
                <span class="toe-pad"></span>
            </div>
        </div>

    </div>
</div>

<script>
    const powerBtn = document.getElementById("powerBtn");
    const playBtn = document.getElementById("playBtn");
    const volBtn = document.getElementById("volBtn");

    const screen = document.getElementById("screen");
    const gif = document.getElementById("gif");
    const message = document.getElementById("message");

    let powered = true;
    let volume = 50;

    // POWER BUTTON
    powerBtn.addEventListener("click", () => {

        powered = !powered;

        if(powered){
            screen.classList.remove("off");
            message.innerHTML = "Simba TV 2000 ✨<br><br>Press PLAY";
            message.style.display = "block";
            gif.style.display = "none";
        }else{
            screen.classList.add("off");
            gif.style.display = "none";
            message.innerHTML = "TV OFF";
            message.style.display = "block";
        }
    });

    // PLAY BUTTON
    playBtn.addEventListener("click", () => {

        if(!powered) return;

        gif.style.display = "block";
        message.style.display = "none";
        screen.classList.remove("off");
    });

    // VOLUME BUTTON
    volBtn.addEventListener("click", () => {

        if(!powered) return;

        volume += 10;

        if(volume > 100){
            volume = 0;
        }

        message.style.display = "block";
        message.innerHTML = "Volume: " + volume + "%";

        setTimeout(() => {
            if(gif.style.display === "block"){
                message.style.display = "none";
            }
        }, 1000);
    });
</script>

</body>
</html>
