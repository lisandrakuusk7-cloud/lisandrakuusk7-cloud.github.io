<!DOCTYPE html>
<html lang="et">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Realistlik Interaktiivne Jungel</title>

<style>
    html, body {
        margin: 0;
        overflow: hidden;
        background: #0b1f12;
        font-family: Arial, sans-serif;
    }

    canvas {
        display: block;
    }

    #info {
        position: absolute;
        top: 15px;
        left: 15px;
        color: white;
        background: rgba(0,0,0,0.35);
        padding: 10px 14px;
        border-radius: 10px;
        backdrop-filter: blur(4px);
        z-index: 10;
        font-size: 14px;
        line-height: 1.5;
    }
</style>
</head>

<body>

<div id="info">
    🌿 Interaktiivne realistlik jungel<br>
    🖱 Liiguta hiirt – jõgi reageerib<br>
    ☀ Päike liigub aeglaselt<br>
    🐒 Loomad liiguvad ja jälgivad ümbrust
</div>

<canvas id="scene"></canvas>

<script>
const canvas = document.getElementById("scene");
const ctx = canvas.getContext("2d");

let w, h;

function resize() {
    w = canvas.width = window.innerWidth;
    h = canvas.height = window.innerHeight;
}
window.addEventListener("resize", resize);
resize();

const mouse = {
    x: w/2,
    y: h/2
};

window.addEventListener("mousemove", e => {
    mouse.x = e.clientX;
    mouse.y = e.clientY;
});

//////////////////////////////////////////////////////
// SKY + SUN
//////////////////////////////////////////////////////

let sunAngle = 0;

function drawSky() {
    const gradient = ctx.createLinearGradient(0,0,0,h);

    gradient.addColorStop(0, "#78c8ff");
    gradient.addColorStop(0.5, "#9be2ff");
    gradient.addColorStop(1, "#d9f5ff");

    ctx.fillStyle = gradient;
    ctx.fillRect(0,0,w,h);
}

function drawSun() {
    const x = w * 0.75 + Math.cos(sunAngle) * 80;
    const y = h * 0.18 + Math.sin(sunAngle) * 20;

    const glow = ctx.createRadialGradient(x,y,20,x,y,120);
    glow.addColorStop(0, "rgba(255,240,180,0.95)");
    glow.addColorStop(1, "rgba(255,240,180,0)");

    ctx.fillStyle = glow;
    ctx.beginPath();
    ctx.arc(x,y,120,0,Math.PI*2);
    ctx.fill();

    ctx.fillStyle = "#fff2a8";
    ctx.beginPath();
    ctx.arc(x,y,40,0,Math.PI*2);
    ctx.fill();

    sunAngle += 0.001;
}

//////////////////////////////////////////////////////
// MOUNTAINS
//////////////////////////////////////////////////////

function drawMountains() {
    ctx.fillStyle = "#35513b";

    ctx.beginPath();
    ctx.moveTo(0,h*0.45);

    for(let i=0;i<=w;i+=120){
        ctx.lineTo(i,h*0.25 + Math.random()*100);
    }

    ctx.lineTo(w,h);
    ctx.lineTo(0,h);
    ctx.closePath();
    ctx.fill();
}

//////////////////////////////////////////////////////
// TREES
//////////////////////////////////////////////////////

const trees = [];

for(let i=0;i<80;i++){
    trees.push({
        x: Math.random()*w,
        y: h*0.35 + Math.random()*h*0.55,
        scale: 0.6 + Math.random()*1.4
    });
}

function drawTree(tree) {
    const {x,y,scale} = tree;

    ctx.save();

    ctx.translate(x,y);

    // trunk
    ctx.fillStyle = "#4a2c1d";
    ctx.fillRect(-8*scale,-80*scale,16*scale,80*scale);

    // leaves
    for(let i=0;i<5;i++){
        ctx.beginPath();
        ctx.fillStyle = `rgba(${20+Math.random()*20}, ${90+Math.random()*80}, ${20+Math.random()*20}, 0.9)`;

        ctx.arc(
            (Math.random()-0.5)*40*scale,
            -80*scale + (Math.random()-0.5)*40*scale,
            35*scale,
            0,
            Math.PI*2
        );
        ctx.fill();
    }

    ctx.restore();
}

//////////////////////////////////////////////////////
// RIVER
//////////////////////////////////////////////////////

let riverOffset = 0;

function drawRiver() {

    const gradient = ctx.createLinearGradient(0,h*0.5,0,h);

    gradient.addColorStop(0,"#4fd0ff");
    gradient.addColorStop(1,"#0f5c8a");

    ctx.fillStyle = gradient;

    ctx.beginPath();

    ctx.moveTo(0,h);

    for(let y=h*0.55;y<h;y+=20){

        const wave =
            Math.sin(y*0.02 + riverOffset)*50 +
            (mouse.x - w/2) * 0.05;

        const riverWidth =
            200 +
            Math.sin(y*0.01)*60;

        const center = w/2 + wave;

        ctx.lineTo(center-riverWidth,y);
    }

    for(let y=h;y>h*0.55;y-=20){

        const wave =
            Math.sin(y*0.02 + riverOffset)*50 +
            (mouse.x - w/2) * 0.05;

        const riverWidth =
            200 +
            Math.sin(y*0.01)*60;

        const center = w/2 + wave;

        ctx.lineTo(center+riverWidth,y);
    }

    ctx.closePath();
    ctx.fill();

    // water highlights
    ctx.strokeStyle = "rgba(255,255,255,0.35)";
    ctx.lineWidth = 2;

    for(let i=0;i<25;i++){

        const yy = h*0.55 + i*18;

        const wave =
            Math.sin(yy*0.02 + riverOffset)*50 +
            (mouse.x - w/2) * 0.05;

        const center = w/2 + wave;

        ctx.beginPath();
        ctx.moveTo(center-80 + Math.sin(i+riverOffset)*30, yy);
        ctx.lineTo(center+80 + Math.sin(i+riverOffset)*30, yy);
        ctx.stroke();
    }

    riverOffset += 0.03;
}

//////////////////////////////////////////////////////
// ANIMALS
//////////////////////////////////////////////////////

const animals = [
    {
        type: "monkey",
        x: 200,
        y: h*0.62,
        dir: 1,
        speed: 0.4
    },
    {
        type: "tiger",
        x: w-300,
        y: h*0.72,
        dir: -1,
        speed: 0.7
    },
    {
        type: "bird",
        x: 400,
        y: 180,
        dir: 1,
        speed: 1.2
    }
];

function drawMonkey(a) {

    ctx.save();
    ctx.translate(a.x,a.y);

    ctx.scale(a.dir,1);

    ctx.fillStyle = "#5c3d24";

    // body
    ctx.beginPath();
    ctx.ellipse(0,0,30,22,0,0,Math.PI*2);
    ctx.fill();

    // head
    ctx.beginPath();
    ctx.arc(35,-15,18,0,Math.PI*2);
    ctx.fill();

    // tail
    ctx.strokeStyle = "#5c3d24";
    ctx.lineWidth = 5;

    ctx.beginPath();
    ctx.arc(-25,-20,25,0,Math.PI*1.5);
    ctx.stroke();

    // eyes
    ctx.fillStyle = "white";
    ctx.beginPath();
    ctx.arc(40,-18,3,0,Math.PI*2);
    ctx.arc(48,-18,3,0,Math.PI*2);
    ctx.fill();

    ctx.restore();
}

function drawTiger(a){

    ctx.save();
    ctx.translate(a.x,a.y);

    ctx.scale(a.dir,1);

    ctx.fillStyle = "#e48b24";

    ctx.beginPath();
    ctx.ellipse(0,0,50,24,0,0,Math.PI*2);
    ctx.fill();

    // head
    ctx.beginPath();
    ctx.arc(50,-10,20,0,Math.PI*2);
    ctx.fill();

    // stripes
    ctx.strokeStyle = "#1e1e1e";
    ctx.lineWidth = 3;

    for(let i=-30;i<40;i+=12){
        ctx.beginPath();
        ctx.moveTo(i,-18);
        ctx.lineTo(i+5,18);
        ctx.stroke();
    }

    ctx.restore();
}

function drawBird(a){

    ctx.save();
    ctx.translate(a.x,a.y);

    ctx.fillStyle = "#111";

    ctx.beginPath();
    ctx.moveTo(-15,0);
    ctx.quadraticCurveTo(0,-15,15,0);
    ctx.quadraticCurveTo(0,-5,-15,0);
    ctx.fill();

    ctx.restore();
}

function updateAnimals(){

    animals.forEach(a => {

        a.x += a.speed * a.dir;

        if(a.type !== "bird"){
            if(a.x > w-100) a.dir = -1;
            if(a.x < 100) a.dir = 1;
        } else {
            if(a.x > w+50) a.x = -50;
        }

    });
}

function drawAnimals(){

    animals.forEach(a => {

        if(a.type === "monkey") drawMonkey(a);
        if(a.type === "tiger") drawTiger(a);
        if(a.type === "bird") drawBird(a);

    });

}

//////////////////////////////////////////////////////
// FOREGROUND PLANTS
//////////////////////////////////////////////////////

function drawForeground() {

    for(let i=0;i<120;i++){

        const x = i * 20;

        const height = 50 + Math.sin(i)*30;

        ctx.strokeStyle = `rgba(20, ${120+Math.random()*60}, 20, 0.95)`;

        ctx.lineWidth = 3;

        ctx.beginPath();

        ctx.moveTo(x,h);

        ctx.quadraticCurveTo(
            x + Math.sin(i + riverOffset)*15,
            h-height,
            x + Math.cos(i)*10,
            h
        );

        ctx.stroke();
    }
}

//////////////////////////////////////////////////////
// LIGHT RAYS
//////////////////////////////////////////////////////

function drawLightRays(){

    ctx.save();

    ctx.globalAlpha = 0.08;

    for(let i=0;i<8;i++){

        ctx.fillStyle = "#fff7c0";

        ctx.beginPath();

        ctx.moveTo(w*0.72 + i*20,0);
        ctx.lineTo(w*0.78 + i*30,0);
        ctx.lineTo(w*0.55 + i*20,h);
        ctx.lineTo(w*0.45 + i*10,h);

        ctx.closePath();

        ctx.fill();
    }

    ctx.restore();
}

//////////////////////////////////////////////////////
// MAIN LOOP
//////////////////////////////////////////////////////

function animate(){

    requestAnimationFrame(animate);

    drawSky();

    drawSun();

    drawLightRays();

    drawMountains();

    trees.sort((a,b)=>a.y-b.y);

    trees.forEach(drawTree);

    drawRiver();

    updateAnimals();

    drawAnimals();

    drawForeground();
}

animate();

</script>

</body>
</html>
