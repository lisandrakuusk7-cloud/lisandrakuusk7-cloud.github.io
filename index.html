<script>
// Background
const canvas = document.getElementById('bg-canvas');
const ctx = canvas.getContext('2d');
let W, H, stars = [], shoots = [], flies = [];

function resize() { W=canvas.width=window.innerWidth; H=canvas.height=window.innerHeight; }
function init() {
  stars = [];
  for(let i=0; i<250; i++) stars.push({
    x:Math.random()*W, y:Math.random()*H, r:Math.random()*1.5, a:Math.random(),
    ts: Math.random()*0.02, td: Math.random()>0.5?1:-1
  });
  flies = [];
  for(let i=0; i<25; i++) flies.push({
    x:Math.random()*W, y:H*0.6+Math.random()*H*0.4, r:Math.random()*2+1, a:Math.random(),
    vx:(Math.random()-0.5)*0.6, vy:(Math.random()-0.5)*0.5, p:Math.random()*Math.PI*2
  });
}

function draw() {
  const g = ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0, '#020610'); g.addColorStop(0.5, '#0a1a30'); g.addColorStop(1, '#050a18');
  ctx.fillStyle = g; ctx.fillRect(0,0,W,H);

  // Moon
  const mx=W*0.85, my=H*0.15;
  const mg=ctx.createRadialGradient(mx,my,10,mx,my,65);
  mg.addColorStop(0,'#fff'); mg.addColorStop(1,'rgba(255,255,255,0.02)');
  ctx.beginPath(); ctx.arc(mx,my,65,0,Math.PI*2); ctx.fillStyle=mg; ctx.fill();

  stars.forEach(s => {
    s.a += s.ts * s.td; if(s.a>1||s.a<0.1) s.td *= -1;
    ctx.globalAlpha = s.a; ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI*2); ctx.fill();
  });

  if(Math.random()<0.005) shoots.push({ x:Math.random()*W, y:Math.random()*H*0.4, l:Math.random()*120+60, s:Math.random()*15+8, a:1 });
  shoots = shoots.filter(s => s.a > 0);
  shoots.forEach(s => {
    ctx.globalAlpha = s.a; ctx.strokeStyle = '#fff'; ctx.lineWidth = 2.5;
    ctx.beginPath(); ctx.moveTo(s.x, s.y); ctx.lineTo(s.x+s.l, s.y+s.l*0.5); ctx.stroke();
    s.x += s.s; s.y += s.s*0.5; s.a -= 0.025;
  });

  const t = Date.now()*0.001;
  flies.forEach(f => {
    f.x += f.vx; f.y += f.vy;
    if(f.x<0) f.x=W; if(f.x>W) f.x=0; if(f.y<H*0.5) f.y=H; if(f.y>H) f.y=H*0.5;
    const fa = 0.2 + 0.8 * Math.abs(Math.sin(t + f.p));
    const fg = ctx.createRadialGradient(f.x,f.y,0,f.x,f.y,f.r*6);
    fg.addColorStop(0, `rgba(180,255,100,${fa})`); fg.addColorStop(1, 'rgba(0,255,0,0)');
    ctx.beginPath(); ctx.arc(f.x, f.y, f.r*6, 0, Math.PI*2); ctx.fillStyle=fg; ctx.fill();
  });

  requestAnimationFrame(draw);
}
window.addEventListener('resize', () => { resize(); init(); });
resize(); init(); draw();

// Interactions
const tv = document.getElementById('tv-wrapper');
const nose = document.getElementById('_x3C_Nina_x3E_');
const volUp = document.getElementById('_x3C_Heli_valjendav_nupp_x3E_');
const volDown = document.getElementById('_x3C_Heli_vaigistav_nupp_x3E_');
const screenOff = document.getElementById('screen-off');
const volHud = document.getElementById('vol-hud');
const volBar = document.getElementById('vol-bar');
const volNum = document.getElementById('vol-num');

let isTvOn = true, volume = 60, hudTimer;

// Dragging
let drag = false, ox, oy;
tv.addEventListener('mousedown', e => {
  if(e.target.closest('#_x3C_Nina_x3E_') || 
     e.target.closest('#_x3C_Heli_valjendav_nupp_x3E_') || 
     e.target.closest('#_x3C_Heli_vaigistav_nupp_x3E_')) return;
  drag = true;
  const r = tv.getBoundingClientRect();
  ox = e.clientX - r.left; oy = e.clientY - r.top;
  e.preventDefault();
});
document.addEventListener('mousemove', e => {
  if(!drag) return;
  tv.style.left = (e.clientX - ox) + 'px';
  tv.style.top = (e.clientY - oy) + 'px';
  tv.style.transform = 'none';
});
document.addEventListener('mouseup', () => drag = false);

// Instant Power Toggle
nose.addEventListener('mousedown', (e) => {
  e.stopPropagation();
  isTvOn = !isTvOn;
  screenOff.style.opacity = isTvOn ? '0' : '1';
});

// Instant Volume Controls
function updateVol(delta, e) {
  e.stopPropagation();
  volume = Math.max(0, Math.min(100, volume + delta));
  volBar.style.width = volume + '%';
  volNum.textContent = volume;
  volHud.classList.add('show');
  clearTimeout(hudTimer);
  hudTimer = setTimeout(() => volHud.classList.remove('show'), 1500);
}

volUp.addEventListener('mousedown', (e) => updateVol(10, e));
volDown.addEventListener('mousedown', (e) => updateVol(-10, e));

</script>
